server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/majiang_app_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: manage
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  # No mapper xml in this project.

app:
  upload:
    # 文件实际落地目录（相对当前运行目录/或绝对路径）
    avatar-dir: uploads/avatars
    # 图片访问前缀（会被映射到 avatar-dir）
    avatar-public-prefix: /files/avatars
    max-avatar-size-bytes: 5242880
  wechat:
    # appid: ${WECHAT_APPID:}
    # secret: ${WECHAT_SECRET:}
  monitor:
    slow-request-ms: ${SLOW_REQUEST_MS:1000}

logging:
  level:
    com.majiang.backend: debug

